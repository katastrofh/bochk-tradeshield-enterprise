services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: tradeshield
      POSTGRES_PASSWORD: tradeshield
      POSTGRES_DB: tradeshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradeshield -d tradeshield"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - app_storage:/app/storage
    restart: unless-stopped

volumes:
  postgres_data:
  app_storage:
